<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Upload replay</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, Segoe UI, sans-serif;
      background: #121418;
      color: #e8eaed;
    }
    .box {
      width: min(100vw - 2rem, 22rem);
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid #2d333b;
      background: #1c2128;
    }
    .drop {
      padding: 2.25rem 1rem;
      text-align: center;
      border: 2px dashed #444c56;
      border-radius: 10px;
      cursor: pointer;
      color: #8b949e;
      font-size: 0.95rem;
    }
    .drop.on { border-color: #58a6ff; background: rgba(88, 166, 255, 0.06); }
    input[type="file"] { display: none; }
    button {
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.65rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #58a6ff;
      color: #0d1117;
      cursor: pointer;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    #out {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.95rem;
      min-height: 1.4em;
    }
    #out.ok { color: #3fb950; }
    #out.bad { color: #f85149; }
  </style>
</head>
<body>
  <div class="box">
    <div class="drop" id="drop" tabindex="0">Choose a .WAgame file</div>
    <input type="file" id="f" accept=".wagame,.WAgame" />
    <button type="button" id="go" disabled>Upload</button>
    <div id="out"></div>
  </div>

  <script>
    (function () {
      // Optional: HTTPS origin of your director API (no path, no trailing slash). Empty = this page's origin.
      var API_BASE = "";
      // Only if the director uses Bearer auth (PERSONALS_UPLOAD_TOKEN, no PERSONALS_UPLOAD_PUBLIC). Leave empty for open uploads.
      var UPLOAD_TOKEN = "";

      var drop = document.getElementById("drop");
      var file = document.getElementById("f");
      var go = document.getElementById("go");
      var out = document.getElementById("out");

      function baseUrl() {
        var b = String(API_BASE || "").trim().replace(/\/$/, "");
        return b || location.origin;
      }

      function endpoint() {
        return baseUrl() + "/api/personals-upload";
      }

      function baseName(p) {
        var s = String(p).replace(/\\/g, "/");
        var i = s.lastIndexOf("/");
        return i >= 0 ? s.slice(i + 1) : s;
      }

      function sync() {
        go.disabled = !file.files || file.files.length === 0;
      }

      drop.onclick = function () {
        file.click();
      };
      drop.onkeydown = function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          file.click();
        }
      };
      ["dragenter", "dragover"].forEach(function (ev) {
        drop.addEventListener(ev, function (e) {
          e.preventDefault();
          drop.classList.add("on");
        });
      });
      ["dragleave", "drop"].forEach(function (ev) {
        drop.addEventListener(ev, function (e) {
          e.preventDefault();
          drop.classList.remove("on");
        });
      });
      drop.addEventListener("drop", function (e) {
        var x = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (!x) return;
        var dt = new DataTransfer();
        dt.items.add(x);
        file.files = dt.files;
        sync();
      });

      file.onchange = sync;

      go.onclick = function () {
        out.textContent = "";
        out.className = "";
        if (!file.files || !file.files[0]) return;

        go.disabled = true;
        var fd = new FormData();
        fd.append("file", file.files[0]);

        var headers = {};
        var tok = String(UPLOAD_TOKEN || "").trim();
        if (tok) headers.Authorization = "Bearer " + tok;

        fetch(endpoint(), {
          method: "POST",
          headers: headers,
          body: fd,
        })
          .then(function (r) {
            return r.text().then(function (txt) {
              var j = {};
              try {
                j = txt ? JSON.parse(txt) : {};
              } catch (e) {
                throw new Error(txt || "Error");
              }
              if (!r.ok) throw new Error(j.detail || j.error || "Upload failed");
              return j;
            });
          })
          .then(function (j) {
            var name = baseName(j.path || "");
            out.innerHTML = "Success.<br><strong>" + name + "</strong>";
            out.className = "ok";
          })
          .catch(function (err) {
            out.textContent = String(err.message || err);
            out.className = "bad";
          })
          .finally(function () {
            sync();
          });
      };
    })();
  </script>
</body>
</html>
