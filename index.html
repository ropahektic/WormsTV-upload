<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Upload replay</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, Segoe UI, sans-serif;
      background: #121418;
      color: #e8eaed;
    }
    .wrap { width: min(100vw - 2rem, 26rem); }
    .box {
      padding: 1.5rem;
      border-radius: 12px;
      border: 1px solid #2d333b;
      background: #1c2128;
    }
    .drop {
      padding: 2.25rem 1rem;
      text-align: center;
      border: 2px dashed #444c56;
      border-radius: 10px;
      cursor: pointer;
      color: #8b949e;
      font-size: 0.95rem;
    }
    .drop.on { border-color: #58a6ff; background: rgba(88, 166, 255, 0.06); }
    .drop.wait { pointer-events: none; opacity: 0.65; }
    input[type="file"] { display: none; }
    label.field {
      display: block;
      margin-top: 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #8b949e;
    }
    input[type="text"] {
      width: 100%;
      margin-top: 0.35rem;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      border: 1px solid #444c56;
      background: #0d1117;
      color: #e8eaed;
      font-size: 0.95rem;
    }
    input[type="text"]::placeholder { color: #6e7681; }
    .hint { font-size: 0.75rem; color: #6e7681; margin-top: 0.35rem; line-height: 1.35; }
    .hint.warn { color: #d29922; }
    .hint.err { color: #f85149; }
    button {
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.65rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      background: #58a6ff;
      color: #0d1117;
      cursor: pointer;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    #out {
      margin-top: 1rem;
      text-align: center;
      font-size: 0.95rem;
      min-height: 1.4em;
    }
    #out.ok { color: #3fb950; }
    #out.bad { color: #f85149; }
    .log-panel {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 1px solid #2d333b;
    }
    .log-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #8b949e;
      margin-bottom: 0.5rem;
    }
    #log {
      font-size: 0.8rem;
      line-height: 1.45;
      color: #adbac7;
      max-height: 11rem;
      overflow-y: auto;
      padding-right: 0.25rem;
    }
    #log .entry { margin-bottom: 0.45rem; word-break: break-word; }
    #log .entry strong { color: #e6edf3; font-weight: 600; }
    #log .empty { color: #6e7681; font-style: italic; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="box">
      <div class="drop wait" id="drop" tabindex="0">Loading…</div>
      <input type="file" id="f" accept=".wagame,.WAgame" disabled />

      <p id="api-line" class="hint" style="min-height:1.35em"></p>

      <label class="field" for="user">Your name <span style="font-weight:400;opacity:.75">(optional)</span></label>
      <input type="text" id="user" maxlength="64" placeholder="e.g. wormfan_42" autocomplete="nickname" disabled />
      <p class="hint">Letters, numbers, underscores, hyphens only (saved under Personals/&lt;name&gt;/). Leave empty → inbox.</p>

      <button type="button" id="go" disabled>Upload</button>
      <div id="out"></div>

      <div class="log-panel">
        <div class="log-title">Recent uploads (everyone)</div>
        <div id="log"></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var MAX_BYTES = 1048576;

      /** Only for local testing: paste a full https API origin here. Production uses api-base.json from GitHub. */
      var DEV_API_BASE = "";

      var UPLOAD_TOKEN = "";

      var drop = document.getElementById("drop");
      var file = document.getElementById("f");
      var userEl = document.getElementById("user");
      var go = document.getElementById("go");
      var out = document.getElementById("out");
      var logEl = document.getElementById("log");
      var apiLine = document.getElementById("api-line");

      var USER_RE = /^[a-zA-Z0-9_-]{1,64}$/;

      /** @type {string | null} */
      var resolvedBase = null;
      var apiReady = false;

      function stripBase(u) {
        return String(u || "")
          .trim()
          .replace(/\/$/, "");
      }

      function isGitHubPages() {
        return /\.github\.io$/i.test(location.hostname);
      }

      function pageDirHref() {
        var h = location.href;
        return h.endsWith("/") ? h : h + "/";
      }

      function unlockUi() {
        drop.classList.remove("wait");
        drop.textContent = "Choose a .WAgame file (max 1\u00a0MB)";
        file.disabled = false;
        userEl.disabled = false;
        apiReady = true;
        sync();
        void refreshServerLog();
      }

      function lockUi(msg, asError) {
        drop.classList.add("wait");
        drop.textContent = "Unavailable";
        file.disabled = true;
        userEl.disabled = true;
        go.disabled = true;
        apiLine.textContent = msg;
        apiLine.className = "hint " + (asError ? "err" : "warn");
        if (asError) {
          out.textContent = msg;
          out.className = "bad";
        }
      }

      /** `api-base.json` lives next to this file on GitHub Pages; on the director it is at `/api-base.json`. */
      function apiConfigUrl() {
        if (isGitHubPages()) {
          return new URL("api-base.json", pageDirHref()).href;
        }
        return new URL("/api-base.json", location.origin).href;
      }

      /** Loads api-base.json next to this page; fallback is same origin (director /upload). */
      function resolveApiBase() {
        var dev = stripBase(DEV_API_BASE);
        if (dev && /^https:\/\//i.test(dev)) {
          resolvedBase = dev;
          apiLine.textContent = "Dev override (DEV_API_BASE).";
          apiLine.className = "hint warn";
          return Promise.resolve();
        }

        var cfgUrl = apiConfigUrl();
        return fetch(cfgUrl, { cache: "no-store" })
          .then(function (r) {
            if (!r.ok) throw new Error("no api-base");
            return r.json();
          })
          .then(function (j) {
            var u = j && typeof j.url === "string" ? stripBase(j.url) : "";
            if (u && /^https:\/\//i.test(u)) {
              resolvedBase = u;
              apiLine.textContent = "";
              apiLine.className = "hint";
              return;
            }
            throw new Error("empty url");
          })
          .catch(function () {
            resolvedBase = location.origin;
            if (isGitHubPages()) {
              throw new Error(
                "Missing or invalid api-base.json. On the director PC set UPLOAD_PAGE_API_URL in .env (your https tunnel), then run: node web/replay-upload/publish-gh.mjs",
              );
            }
            apiLine.textContent = "API: " + resolvedBase + " (open this page from the director, or publish api-base.json for GitHub Pages).";
            apiLine.className = "hint";
          });
      }

      function baseUrl() {
        return resolvedBase || location.origin;
      }

      function endpoint() {
        return baseUrl() + "/api/personals-upload";
      }

      function logEndpoint() {
        return baseUrl() + "/api/upload-log";
      }

      function baseName(p) {
        var s = String(p).replace(/\\/g, "/");
        var i = s.lastIndexOf("/");
        return i >= 0 ? s.slice(i + 1) : s;
      }

      function refreshServerLog() {
        if (!resolvedBase) return Promise.resolve();
        return fetch(logEndpoint(), { cache: "no-store" })
          .then(function (r) {
            return r.text().then(function (txt) {
              var j = {};
              try {
                j = txt ? JSON.parse(txt) : {};
              } catch (e) {
                j = {};
              }
              if (!r.ok) throw new Error("log fetch failed");
              return j;
            });
          })
          .then(function (j) {
            var entries = j && Array.isArray(j.entries) ? j.entries : [];
            renderLogEntries(entries);
          })
          .catch(function () {
            logEl.innerHTML = '<div class="empty">Could not load upload log.</div>';
          });
      }

      function renderLogEntries(arr) {
        if (!arr.length) {
          logEl.innerHTML = '<div class="empty">No uploads yet.</div>';
          return;
        }
        var html = "";
        for (var i = 0; i < arr.length; i++) {
          var e = arr[i];
          var when = new Date(e.at).toLocaleString();
          var who = e.by ? String(e.by) : "anonymous";
          var fn = e.file ? String(e.file) : "(file)";
          html +=
            '<div class="entry"><strong>' +
            escapeHtml(fn) +
            "</strong> uploaded by <strong>" +
            escapeHtml(who) +
            "</strong> &middot; " +
            escapeHtml(when) +
            "</div>";
        }
        logEl.innerHTML = html;
      }

      function escapeHtml(s) {
        var d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function sync() {
        if (!apiReady) {
          go.disabled = true;
          return;
        }
        var okFile = file.files && file.files.length > 0;
        var szOk = true;
        if (okFile && file.files[0].size > MAX_BYTES) szOk = false;
        go.disabled = !okFile || !szOk;
      }

      drop.onclick = function () {
        file.click();
      };
      drop.onkeydown = function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          file.click();
        }
      };
      ["dragenter", "dragover"].forEach(function (ev) {
        drop.addEventListener(ev, function (e) {
          e.preventDefault();
          drop.classList.add("on");
        });
      });
      ["dragleave", "drop"].forEach(function (ev) {
        drop.addEventListener(ev, function (e) {
          e.preventDefault();
          drop.classList.remove("on");
        });
      });
      drop.addEventListener("drop", function (e) {
        var x = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (!x) return;
        var dt = new DataTransfer();
        dt.items.add(x);
        file.files = dt.files;
        sync();
        warnSize();
      });

      file.onchange = function () {
        sync();
        warnSize();
      };

      function warnSize() {
        if (file.files && file.files[0] && file.files[0].size > MAX_BYTES) {
          out.textContent = "File is larger than 1 MB.";
          out.className = "bad";
        } else if (out.className === "bad" && out.textContent.indexOf("1 MB") >= 0) {
          out.textContent = "";
          out.className = "";
        }
      }

      go.onclick = function () {
        out.textContent = "";
        out.className = "";
        if (!apiReady || !resolvedBase) {
          out.textContent = "API not ready yet.";
          out.className = "bad";
          return;
        }
        if (!file.files || !file.files[0]) return;

        if (file.files[0].size > MAX_BYTES) {
          out.textContent = "File is larger than 1 MB.";
          out.className = "bad";
          return;
        }

        var rawUser = String(userEl.value || "").trim();
        if (rawUser && !USER_RE.test(rawUser)) {
          out.textContent =
            "Name: use only letters, numbers, underscores, and hyphens (1–64 chars), or leave empty.";
          out.className = "bad";
          return;
        }

        go.disabled = true;
        var fd = new FormData();
        fd.append("file", file.files[0]);
        if (rawUser) fd.append("username", rawUser);

        var headers = {};
        var tok = String(UPLOAD_TOKEN || "").trim();
        if (tok) headers.Authorization = "Bearer " + tok;

        fetch(endpoint(), {
          method: "POST",
          headers: headers,
          body: fd,
        })
          .then(function (r) {
            return r.text().then(function (txt) {
              var j = {};
              try {
                j = txt ? JSON.parse(txt) : {};
              } catch (e) {
                throw new Error(txt || "Error");
              }
              if (!r.ok) throw new Error(j.detail || j.error || "Upload failed");
              return j;
            });
          })
          .then(function (j) {
            var name = baseName(j.path || "");
            out.innerHTML = "Success.<br><strong>" + escapeHtml(name) + "</strong>";
            out.className = "ok";
            void refreshServerLog();
          })
          .catch(function (err) {
            out.textContent = String(err.message || err);
            out.className = "bad";
          })
          .finally(function () {
            sync();
          });
      };

      resolveApiBase()
        .then(function () {
          unlockUi();
        })
        .catch(function (err) {
          lockUi(String(err.message || err), true);
        });
    })();
  </script>
</body>
</html>
